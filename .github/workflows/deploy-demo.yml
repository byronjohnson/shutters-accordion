name: Redirect legacy demo URL

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Prepare redirect site
        run: |
          mkdir -p _site/demo
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0;url=https://shuttersjs.com/">
            <link rel="canonical" href="https://shuttersjs.com/">
            <title>Shutters Accordion</title>
          </head>
          <body>
            <p><a href="https://shuttersjs.com/">Shutters Accordion — moved to shuttersjs.com</a></p>
          </body>
          </html>
          EOF
          cat > _site/demo/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0;url=https://shuttersjs.com/">
            <link rel="canonical" href="https://shuttersjs.com/">
            <title>Shutters Accordion</title>
          </head>
          <body>
            <p><a href="https://shuttersjs.com/">Shutters Accordion — moved to shuttersjs.com</a></p>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
